<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOA Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8FAFC;--surf:#FFFFFF;--bdr:#E2E8F0;--bdr2:#CBD5E1;
  --ind:#4F46E5;--ind2:#4338CA;--indl:#EEF2FF;--indm:#C7D2FE;
  --sl:#0F172A;--sl2:#334155;--mu:#64748B;--fa:#94A3B8;
  --gn:#059669;--gnb:#D1FAE5;--rd:#DC2626;--rdb:#FEE2E2;
  --yw:#D97706;--ywb:#FEF3C7;--pu:#7C3AED;--pub:#EDE9FE;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);
  --shl:0 10px 25px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.04);
  --r:8px;--rl:12px;
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--sl);background:var(--bg);-webkit-font-smoothing:antialiased}

/* Spinner */
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--mu);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--ind);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
.hdr{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:10}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-logo{width:32px;height:32px;background:var(--ind);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--mu);margin-top:1px}
.hdr-r{display:flex;gap:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s;line-height:1;white-space:nowrap}
.btn-p{background:var(--ind);color:#fff}.btn-p:hover{background:var(--ind2)}
.btn-s{background:var(--surf);color:var(--sl2);border:1px solid var(--bdr2)}.btn-s:hover{background:var(--bg);border-color:var(--ind);color:var(--ind)}
.btn-g{background:transparent;color:var(--mu);padding:6px 10px}.btn-g:hover{background:var(--bg);color:var(--sl)}
.btn-d{background:var(--rdb);color:var(--rd);border:1px solid #FECACA}.btn-d:hover{background:#FEE2E2}
.btn-w{background:var(--ywb);color:var(--yw);border:1px solid #FDE68A}.btn-w:hover{background:#FDE68A}
.btn-sm{padding:5px 10px;font-size:12px}
.bico{background:transparent;border:none;cursor:pointer;padding:5px;border-radius:6px;color:var(--fa);font-size:13px;transition:all .15s;display:inline-flex;align-items:center}
.bico:hover{background:var(--bg);color:var(--mu)}

/* Tabs */
.tabs{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 28px;display:flex;gap:4px}
.tab{padding:12px 14px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--mu);transition:all .15s;margin-bottom:-1px}
.tab.on{color:var(--ind);border-bottom-color:var(--ind)}
.tab:hover:not(.on){color:var(--sl)}

/* Sub-tabs (Board) */
.subnav{display:flex;gap:3px;margin-bottom:20px;background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:4px;width:fit-content}
.stab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--mu);transition:all .15s}
.stab.on{background:var(--surf);color:var(--ind);box-shadow:var(--sh)}
.stab:hover:not(.on){color:var(--sl)}

/* Layout */
.page{padding:24px 28px;max-width:1140px}

/* Stats */
.stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px 20px;flex:1;min-width:120px;box-shadow:var(--sh)}
.s-lbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:6px}
.s-val{font-size:26px;font-weight:700;color:var(--sl);line-height:1}
.vi{color:var(--ind)}.vg{color:var(--gn)}.vr{color:var(--rd)}.vy{color:var(--yw)}

/* Property list */
.prop-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start}
.search-inp{width:100%;padding:8px 12px;border:1px solid var(--bdr2);border-radius:var(--r);font-family:inherit;font-size:13px;outline:none;background:var(--surf);margin-bottom:8px}
.search-inp:focus{border-color:var(--ind);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.filter-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:12px;color:var(--mu);cursor:pointer}
.filter-row input{accent-color:var(--ind)}
.list-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:8px}
.prop-list{display:flex;flex-direction:column;gap:6px}
.pc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.pc:hover{border-color:var(--ind);box-shadow:var(--shm)}
.pc.on{border-color:var(--ind);background:var(--indl)}
.pc.dim{opacity:.55}
.pc-addr{font-size:13px;font-weight:600;color:var(--sl);margin-bottom:2px}
.pc-owner{font-size:12px;color:var(--mu)}
.pc-bdg{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}

/* Badges */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-pd{background:var(--gnb);color:var(--gn)}
.b-un{background:var(--rdb);color:var(--rd)}
.b-pt{background:var(--ywb);color:var(--yw)}
.b-vl{background:var(--rdb);color:var(--rd)}
.b-nr{background:var(--pub);color:var(--pu)}
.b-in{background:#F1F5F9;color:var(--mu);border:1px solid var(--bdr)}
.b-sd{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}

/* Detail panel */
.dp{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);box-shadow:var(--shm);overflow:hidden}
.dp-hdr{padding:20px 24px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.dp-addr{font-size:18px;font-weight:700}
.dp-sub{font-size:13px;color:var(--mu);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dp-acts{display:flex;gap:8px;flex-shrink:0}
.bal-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bdr);border-bottom:1px solid var(--bdr)}
.bal-cell{background:var(--bg);padding:10px 16px;text-align:center}
.bal-lbl{font-size:11px;color:var(--mu);margin-bottom:3px}
.bal-val{font-size:15px;font-weight:700}
.dp-body{padding:20px 24px}
.dp-sec{margin-bottom:24px}.dp-sec:last-child{margin-bottom:0}
.dp-shd{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ik{font-size:11px;color:var(--fa);margin-bottom:2px;font-weight:500}
.iv{font-size:13px;color:var(--sl);font-weight:500}
.cbox{background:var(--indl);border:1px solid var(--indm);border-radius:var(--r);padding:12px 16px;margin-top:10px}
.cbox-lbl{font-size:11px;font-weight:600;color:var(--ind);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--mu);background:var(--bg);border-bottom:1px solid var(--bdr)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--bdr);color:var(--sl2);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--bg)}

/* Violations */
.vc{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.vc-dt{font-size:11px;color:var(--mu);margin-bottom:2px}
.vc-tx{font-size:13px;color:var(--sl)}
.vc-st{font-size:11px;font-weight:600;margin-top:4px}
.vc-st.open{color:var(--rd)}.vc-st.resolved{color:var(--gn)}
.vc-acts{display:flex;gap:2px;flex-shrink:0}

/* Doc log */
.doc-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bdr);gap:8px}
.doc-row:last-child{border-bottom:none}
.doc-dt{font-size:11px;color:var(--mu);white-space:nowrap;flex-shrink:0}
.doc-tx{font-size:13px;color:var(--sl)}

/* Tasks */
.tk-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.tk-top-l h2{font-size:16px;font-weight:600}
.tk-top-l p{font-size:12px;color:var(--mu);margin-top:2px}
.tk-top-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.yr-nav{display:flex;align-items:center;gap:6px}
.yr-val{font-size:16px;font-weight:700;min-width:48px;text-align:center}
.load-btn{background:var(--indl);color:var(--ind);border:1px solid var(--indm);border-radius:var(--r);padding:7px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.load-btn:hover{background:var(--ind);color:#fff}
.prog-bar{height:4px;background:var(--bdr);border-radius:2px;margin-bottom:20px;overflow:hidden}
.prog-fill{height:100%;background:var(--ind);border-radius:2px;transition:width .35s}
.mo-block{margin-bottom:16px;border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
.mo-head{background:var(--sl);color:#fff;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.tk-row{display:grid;grid-template-columns:28px 1fr auto auto;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bdr);background:var(--surf);transition:background .12s}
.tk-row:last-child{border-bottom:none}
.tk-row:hover{background:var(--bg)}
.tk-row.done .t-dsc{text-decoration:line-through;color:var(--fa)}
.t-chk{width:18px;height:18px;border:2px solid var(--bdr2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:10px}
.t-chk:hover{border-color:var(--ind)}
.t-chk.on{background:var(--ind);border-color:var(--ind);color:#fff}
.t-dsc{font-size:13px;color:var(--sl)}
.t-sub{font-size:11px;color:var(--mu);margin-top:2px}
.t-asgn{font-size:12px;color:var(--mu);white-space:nowrap}
.t-due{font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap}
.t-due.late{background:var(--rdb);color:var(--rd)}
.t-due.soon{background:var(--ywb);color:var(--yw)}
.t-due.ok{color:var(--mu)}
.t-acts{display:flex;gap:2px}
.tmpl-note{background:var(--indl);border:1px solid var(--indm);border-radius:var(--rl);padding:14px 18px;margin-bottom:20px;font-size:13px;color:var(--sl2);line-height:1.5}

/* Board cards */
.bc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px 20px;margin-bottom:10px;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.bc-info .bc-name{font-size:14px;font-weight:600}
.bc-info .bc-role{font-size:12px;color:var(--ind);font-weight:500;margin-top:2px}
.bc-info .bc-dtl{font-size:12px;color:var(--mu);margin-top:6px;line-height:1.6}
.bc-acts{display:flex;gap:4px;flex-shrink:0}
.min-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px 20px;margin-bottom:10px;box-shadow:var(--sh)}
.min-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.min-dt{font-size:11px;color:var(--mu)}
.min-title{font-size:14px;font-weight:600;margin-top:1px}
.min-att{font-size:12px;color:var(--mu);margin-bottom:8px}
.min-notes{font-size:13px;color:var(--sl2);line-height:1.5;white-space:pre-wrap;background:var(--bg);border-radius:var(--r);padding:10px 12px}

/* Reports */
.rpt-sec{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);margin-bottom:16px;overflow:hidden;box-shadow:var(--sh)}
.rpt-hd{padding:14px 20px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.rpt-hd h3{font-size:14px;font-weight:600}
.rpt-body{padding:16px 20px}
.email-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.email-lbl{font-size:13px;color:var(--sl)}
.email-cnt{font-size:12px;color:var(--mu);flex:1}
.copy-box{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px;font-size:11px;font-family:monospace;color:var(--mu);word-break:break-all;max-height:48px;overflow:hidden;margin:4px 0 8px;line-height:1.4}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surf);border-radius:var(--rl);width:100%;max-width:560px;box-shadow:var(--shl);max-height:90vh;overflow-y:auto}
.modal-hd{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-hd h3{font-size:16px;font-weight:600}
.modal-bd{padding:0 24px}
.modal-ft{padding:16px 24px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.btn:disabled{opacity:.55;cursor:not-allowed}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 12px;border:1px solid var(--bdr2);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--sl);background:var(--surf);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--ind);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.fg textarea{resize:vertical;min-height:64px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sdiv{font-size:11px;font-weight:600;color:var(--ind);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 6px;border-bottom:1px solid var(--indm);margin-bottom:14px;margin-top:4px}
.tgl{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;background:var(--bg);border-radius:var(--r);border:1px solid var(--bdr)}
.tgl label{font-size:13px;font-weight:500;cursor:pointer}
.tgl input[type=checkbox]{width:16px;height:16px;accent-color:var(--ind);cursor:pointer;flex-shrink:0}
.notice-area{width:100%;padding:14px;border:1px solid var(--bdr2);border-radius:var(--r);font-family:monospace;font-size:12px;color:var(--sl2);line-height:1.7;background:var(--bg);outline:none;resize:none;height:340px}

/* Misc */
.empty-st{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;color:var(--mu)}
.empty-st .ico{font-size:2rem;margin-bottom:10px}
.empty-st p{font-size:13px;line-height:1.6}

/* Print */
@media print{
  .hdr,.tabs,.hdr-r,.dp-acts,.bico,.t-acts,.bc-acts,.btn:not(.no-hide),
  .subnav,.tk-top-r,.prop-layout>div:first-child,.stats{display:none!important}
  body{background:white}.page{padding:0;max-width:100%}
  .dp{box-shadow:none;border:1px solid #ccc}.prop-layout{grid-template-columns:1fr}
}
@media(max-width:700px){
  .prop-layout{grid-template-columns:1fr}.frow,.igrid{grid-template-columns:1fr}
  .page{padding:16px}.hdr{padding:0 16px}.tabs{padding:0 16px}.tk-top-r{width:100%}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
var App = {
  loading: true,
  data: {
    settings: {hoaName:'HOA Manager',duesAmount:'0',duesDueDate:'',hoaPhone:'',hoaAddress:'',appUrl:''},
    properties:[], tasks:[], templates:[], members:[], vendors:[], minutes:[]
  },
  selectedId: null,
  tab: 'properties',   // properties | tasks | board | reports
  tasksView: 'year',   // year | templates
  boardView: 'members', // members | vendors | minutes
  modal: null,
  taskYear: new Date().getFullYear(),
  propSearch: '',
  showInactive: false
};
var MOS = ['January','February','March','April','May','June',
           'July','August','September','October','November','December'];

// ─── UTILS ────────────────────────────────────────────────────────────────────
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fdt(d){
  if(!d)return '—';var p=String(d).split('-');if(p.length!==3)return d;
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+p[1]-1]+' '+parseInt(p[2])+', '+p[0];
}
function today(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return('0'+n).slice(-2);}
function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function gc(id){var e=document.getElementById(id);return e?e.checked:false;}
function moName(m){return parseInt(m)>0?MOS[parseInt(m)-1]:'Unscheduled';}
function duesBadge(s){
  if(s==='paid')return '<span class="bdg b-pd">Paid</span>';
  if(s==='partial')return '<span class="bdg b-pt">Partial</span>';
  return '<span class="bdg b-un">Unpaid</span>';
}
function stBadge(s){
  if(s==='inactive')return '<span class="bdg b-in">Inactive</span>';
  if(s==='sold')return '<span class="bdg b-sd">Sold</span>';
  return '';
}
function dueBadge(due,st){
  if(st==='done'||!due)return '';
  var df=Math.ceil((new Date(due+'T12:00:00')-new Date())/86400000);
  if(df<0)return '<span class="t-due late">Overdue</span>';
  if(df<=14)return '<span class="t-due soon">Due '+fdt(due)+'</span>';
  return '<span class="t-due ok">'+fdt(due)+'</span>';
}
function calcBal(prop){
  var amt=parseFloat(App.data.settings.duesAmount)||0;
  if(!amt)return null;
  var yr=new Date().getFullYear();
  var paid=(prop.payments||[])
    .filter(function(pm){return String((pm.date||'').substring(0,4))===String(yr);})
    .reduce(function(s,pm){return s+parseFloat(pm.amount||0);},0);
  return {assessed:amt,paid:paid,balance:amt-paid};
}
function fmt$(n){return '$'+(parseFloat(n)||0).toFixed(2);}

// ─── LOOKUP MAP ───────────────────────────────────────────────────────────────
var _map={};
function _reg(obj){if(obj&&obj.id)_map[obj.id]=obj;return obj;}
function openModalById(type,id){App.modal={type:type,payload:_map[id]||{}};render();}

// ─── DATA ─────────────────────────────────────────────────────────────────────
// silent=true: don't show spinner (safe to call from inside google.script.run callbacks)
// silent=false (default): show spinner first (safe for initial page load)
function loadData(cb, silent){
  if(!silent){ App.loading=true; render(); }
  google.script.run
    .withSuccessHandler(function(d){
      App.data=d; App.loading=false;
      setTimeout(function(){ if(cb)cb(d); else render(); }, 0);
    })
    .withFailureHandler(function(e){
      App.loading=false;
      var msg=e.message||e;
      setTimeout(function(){ render(); alert('Load error: '+msg); }, 0);
    })
    .getAllData();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  var root=document.getElementById('app');if(!root)return;
  if(App.loading){root.innerHTML='<div class="spin-wrap"><div class="spinner"></div><p>Loading…</p></div>';return;}
  _map={};
  // Pre-register all data objects for safe onclick lookups
  App.data.properties.forEach(function(p){
    _reg(p);
    (p.payments||[]).forEach(function(pm){_reg(pm);});
    (p.violations||[]).forEach(function(v){
      _reg(v);
      // composite for violation notice
      var vnk='vn-'+v.id;
      _map[vnk]={id:vnk,prop:p,viol:v};
    });
    (p.docs||[]).forEach(function(d){_reg(d);});
    // add-doc payload key
    var dk='adddoc-'+p.id;
    _map[dk]={id:dk,propertyId:p.id,address:p.address};
  });
  App.data.tasks.forEach(function(t){_reg(t);});
  App.data.templates.forEach(function(t){_reg(t);});
  App.data.members.forEach(function(m){_reg(m);});
  App.data.vendors.forEach(function(v){_reg(v);});
  App.data.minutes.forEach(function(m){_reg(m);});

  var html=renderHeader()+renderTabs()+'<div class="page">';
  if(App.tab==='properties')html+=renderPropsTab();
  else if(App.tab==='tasks')html+=renderTasksTab();
  else if(App.tab==='board')html+=renderBoardTab();
  else html+=renderReportsTab();
  html+='</div>';
  if(App.modal)html+=renderModal();
  root.innerHTML=html;

  // Restore search focus
  if(App.tab==='properties'&&App.propSearch){
    var el=document.getElementById('propSearch');
    if(el){el.focus();el.setSelectionRange(App.propSearch.length,App.propSearch.length);}
  }
}

// ─── HEADER ───────────────────────────────────────────────────────────────────
function renderHeader(){
  var name=h(App.data.settings.hoaName||'HOA Manager');
  var raw=(App.data.settings.hoaName||'HOA Manager');
  var initials=raw.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
  var appUrl=App.data.settings.appUrl||'';
  var urlDisplay='';
  if(appUrl){
    // Show just the domain+path, strip protocol for display
    var display=appUrl.replace(/^https?:\/\//,'');
    urlDisplay=' · <a href="'+h(appUrl)+'" target="_blank" style="color:var(--ind);text-decoration:none;font-weight:500">🔗 '+h(display)+'</a>';
  }
  var btn='';
  if(App.tab==='properties') btn='<button class="btn btn-p btn-sm" onclick="openModal(\'addProperty\',{})">+ Add Property</button>';
  else if(App.tab==='tasks'){
    if(App.tasksView==='templates') btn='<button class="btn btn-p btn-sm" onclick="openModal(\'addTemplate\',{})">+ Add Template</button>';
    else btn='<button class="btn btn-p btn-sm" onclick="openModal(\'addTask\',{})">+ Add Task</button>';
  } else if(App.tab==='board'){
    if(App.boardView==='members') btn='<button class="btn btn-p btn-sm" onclick="openModal(\'addMember\',{})">+ Add Member</button>';
    else if(App.boardView==='vendors') btn='<button class="btn btn-p btn-sm" onclick="openModal(\'addVendor\',{})">+ Add Vendor</button>';
    else btn='<button class="btn btn-p btn-sm" onclick="openModal(\'addMinutes\',{})">+ Add Minutes</button>';
  }
  return '<div class="hdr"><div class="hdr-l">'+
    '<div class="hdr-logo">'+initials+'</div>'+
    '<div><div class="hdr-title">'+name+'</div><div class="hdr-sub">HOA Management'+urlDisplay+'</div></div></div>'+
    '<div class="hdr-r">'+
    '<button class="btn btn-g btn-sm" onclick="openModal(\'settings\',{})">⚙ Settings</button>'+
    '<button class="btn btn-g btn-sm" onclick="window.print()">🖨 Print</button>'+
    btn+'</div></div>';
}

// ─── PROPERTIES TAB ───────────────────────────────────────────────────────────
function renderPropsTab(){
  var props=App.data.properties;
  var active=props.filter(function(p){return p.status==='active';});
  var paid=active.filter(function(p){return p.duesStatus==='paid';}).length;
  var unpaid=active.filter(function(p){return p.duesStatus!=='paid';}).length;
  var viols=active.reduce(function(a,p){return a+(p.violations||[]).filter(function(v){return v.status==='open';}).length;},0);
  var stats='<div class="stats">'+
    sc('Active Properties',active.length,'vi')+sc('Dues Paid',paid,'vg')+
    sc('Dues Unpaid',unpaid,'vr')+sc('Open Violations',viols,viols>0?'vr':'')+
    '</div>';

  var filtered=props.filter(function(p){
    if(!App.showInactive&&p.status!=='active')return false;
    if(!App.propSearch)return true;
    var q=App.propSearch.toLowerCase();
    return (p.address+' '+(p.ownerName||'')+' '+(p.lotNumber||'')).toLowerCase().indexOf(q)>-1;
  });

  // Auto-select
  if(!App.selectedId||!filtered.find(function(p){return p.id===App.selectedId;})){
    App.selectedId=filtered.length?filtered[0].id:null;
  }
  var sp=filtered.find(function(p){return p.id===App.selectedId;})||null;

  var list='<div>'+
    '<input class="search-inp" id="propSearch" type="text" placeholder="🔍 Search address, owner, lot…" value="'+h(App.propSearch)+'" oninput="App.propSearch=this.value;render()">'+
    '<label class="filter-row"><input type="checkbox"'+(App.showInactive?' checked':'')+' onchange="App.showInactive=this.checked;render()"> Show inactive / sold</label>'+
    '<div class="list-lbl">'+filtered.length+' propert'+(filtered.length===1?'y':'ies')+'</div>'+
    '<div class="prop-list">';
  filtered.forEach(function(p){
    var ov=(p.violations||[]).filter(function(v){return v.status==='open';}).length;
    var bal=calcBal(p);
    var balStr=bal&&bal.assessed?' · '+fmt$(bal.paid)+'/'+fmt$(bal.assessed):'';
    list+='<div class="pc'+(p.id===App.selectedId?' on':'')+(p.status!=='active'?' dim':'')+'" onclick="selectProp(\''+h(p.id)+'\')">'+
      '<div class="pc-addr">'+h(p.address)+(p.lotNumber?' <span style="font-weight:400;color:var(--mu)">Lot '+h(p.lotNumber)+'</span>':'')+'</div>'+
      '<div class="pc-owner">'+h(p.ownerName)+balStr+'</div>'+
      '<div class="pc-bdg">'+duesBadge(p.duesStatus)+
      (ov?'<span class="bdg b-vl">⚠ '+ov+'</span>':'')+
      (p.ownerOccupied==='no'?'<span class="bdg b-nr">Non-res</span>':'')+
      stBadge(p.status)+
      '</div></div>';
  });
  list+='</div></div>';

  var detail=sp?renderDetail(sp):'<div class="empty-st"><p>Select a property to view details.</p></div>';
  if(!filtered.length)detail='<div class="empty-st"><p>No properties match your search.</p></div>';

  return stats+'<div class="prop-layout">'+list+'<div>'+detail+'</div></div>';
}
function sc(label,val,cls){return '<div class="stat"><div class="s-lbl">'+label+'</div><div class="s-val '+(cls||'')+'">'+ val+'</div></div>';}

  html+='</div>';

  // Payments
  html+='<div class="dp-sec"><div class="dp-shd"><span>Payments</span>'+
    '<button class="btn btn-s btn-sm" onclick="openModalById(\'addPayment\',\''+h(p.id)+'\')">+ Add Payment</button></div>';
  if(!pmts.length){html+='<p style="font-size:13px;color:var(--mu);padding:8px 0">No payments yet.</p>';}
  else{
    html+='<table class="tbl"><thead><tr><th>Date</th><th>Period</th><th>Amount</th><th>Status</th><th>Note</th><th></th></tr></thead><tbody>';
    pmts.slice().reverse().forEach(function(pm){
      html+='<tr><td>'+fdt(pm.date)+'</td><td>'+h(pm.period||'—')+'</td>'+
        '<td style="font-weight:600">'+fmt$(pm.amount)+'</td><td>'+duesBadge(pm.status)+'</td>'+
        '<td style="color:var(--mu)">'+h(pm.note||'')+'</td>'+
        '<td><button class="bico" onclick="doDeletePayment(\''+h(pm.id)+'\')">✕</button></td></tr>';
    });
    html+='</tbody></table>';
  }
  html+='</div>';

  // Violations
  html+='<div class="dp-sec"><div class="dp-shd">'+
    '<span>Violations & Notes'+(ov?' <span class="bdg b-vl">'+ov+' open</span>':'')+'</span>'+

  html+='</div>';

    var md=ts.filter(function(t){return t.status==='done';}).length;
    html+='<div class="mo-block"><div class="mo-head"><span>'+moName(m)+'</span><span>'+md+'/'+ts.length+'</span></div>';

// ─── REPORTS TAB ─────────────────────────────────────────────────────────────
function renderReportsTab(){
  var props=App.data.properties;
  var active=props.filter(function(p){return p.status==='active';});
  var unpaid=active.filter(function(p){return p.duesStatus!=='paid';});
  var openV=[];
  active.forEach(function(p){
    (p.violations||[]).filter(function(v){return v.status==='open';})
      .forEach(function(v){openV.push({v:v,addr:p.address,owner:p.ownerName});});
  });

  var html='';

  // Email merge
  var allEmails=active.filter(function(p){return p.ownerEmail;}).map(function(p){return p.ownerEmail;});
  var unpaidEmails=unpaid.filter(function(p){return p.ownerEmail;}).map(function(p){return p.ownerEmail;});
  var nrEmails=active.filter(function(p){return p.ownerOccupied==='no'&&p.contactEmail;}).map(function(p){return p.contactEmail;});

    var yr=new Date().getFullYear();
    return s+(p.payments||[]).filter(function(pm){return String((pm.date||'').substring(0,4))===String(yr);})
      .reduce(function(a,pm){return a+parseFloat(pm.amount||0);},0);

    (duesAmt?ri('Total Assessed ('+new Date().getFullYear()+')',fmt$(totalAssessed)):'')+

        '<span>'+h(p.address)+' — '+h(p.ownerName)+'</span>'+
        '<span>'+duesBadge(p.duesStatus)+'</span></div>';
    });
  }
  html+='</div></div>';

  // Open violations
  html+='<div class="rpt-sec"><div class="rpt-hd"><h3>⚠ Open Violations ('+openV.length+')</h3></div><div class="rpt-body">';
  if(!openV.length)html+='<p style="font-size:13px;color:var(--mu)">No open violations ✓</p>';

    '<span style="font-size:12px;color:var(--mu);font-style:italic">JSON includes all payments, tasks, and board info.</span>'+
    '</div></div>';

  return html;
}

// Immediately disable the Save button on first click — synchronous property
// mutation, no DOM rebuild, safe to call before google.script.run.
// Prevents double-submit while the RPC is in flight.
function _disableSaveBtn(){
  var btn=document.getElementById('modalSaveBtn');
  if(btn){ btn.disabled=true; btn.textContent='Saving…'; }
}
function _onSaveFail(e){
  alert('Save error: '+(e.message||e));
}

// Settings
function doSaveSettings(){
  _disableSaveBtn();
  var s={hoaName:gv('f-hoaNm'),duesAmount:gv('f-duesAmt'),duesDueDate:gv('f-duesDue'),
    hoaAddress:gv('f-hoaAddr'),hoaPhone:gv('f-hoaPhone'),appUrl:gv('f-appUrl')};
  google.script.run
    .withSuccessHandler(function(){
      Object.assign(App.data.settings, s);
      App.modal=null; setTimeout(render,0);
    })
    .withFailureHandler(_onSaveFail)
    .updateSettings(s);
}

// Property
function doSaveProperty(){
  _disableSaveBtn();
  var addr=gv('f-addr'),own=gv('f-owNm');
  if(!addr){alert('Address is required.');return;}
  if(!own){alert('Owner name is required.');return;}
  var pd={address:addr,lotNumber:gv('f-lot'),ownerName:own,ownerEmail:gv('f-owEm'),ownerPhone:gv('f-owPh'),
    moveInDate:gv('f-mvIn'),duesStatus:gv('f-dues'),ownerOccupied:gc('f-nr')?'no':'yes',
    contactName:gv('f-cNm'),contactPhone:gv('f-cPh'),contactEmail:gv('f-cEm'),contactAddress:gv('f-cAd'),
    notes:gv('f-notes'),status:gv('f-status')};
  var isEdit=App.modal.type==='editProperty';
  if(isEdit){
    pd.id=App.modal.payload.id;
    google.script.run
      .withSuccessHandler(function(){
        var idx=App.data.properties.findIndex(function(x){return x.id===pd.id;});
        if(idx>-1) Object.assign(App.data.properties[idx], pd);
        App.modal=null; setTimeout(render,0);
      })
      .withFailureHandler(_onSaveFail)
      .updateProperty(pd);
  } else {
    google.script.run
      .withSuccessHandler(function(newId){
        pd.id=newId; pd.payments=[]; pd.violations=[]; pd.docs=[];
        App.data.properties.push(pd);
        App.selectedId=newId;
        App.modal=null; setTimeout(render,0);
      })
      .withFailureHandler(_onSaveFail)
      .addProperty(pd);
  }
}
function doDeleteProperty(id){
  var p=App.data.properties.find(function(x){return x.id===id;});
  if(!confirm('Remove "'+((p&&p.address)||id)+'" and ALL its records? This cannot be undone.'))return;
  google.script.run
    .withSuccessHandler(function(){
      App.data.properties=App.data.properties.filter(function(x){return x.id!==id;});
      App.selectedId=App.data.properties.length?App.data.properties[0].id:null;
      setTimeout(render,0);
    })
    .withFailureHandler(_onSaveFail)
    .deleteProperty(id);
}
function doBulkReset(){
  if(!confirm('Reset ALL active properties to Unpaid? This should be done once at the start of a new dues year.'))return;
  google.script.run
    .withSuccessHandler(function(n){
      App.data.properties.forEach(function(p){ if(p.status==='active') p.duesStatus='unpaid'; });
      setTimeout(function(){ render(); alert(n+' properties reset to Unpaid.'); },0);
    })
    .withFailureHandler(_onSaveFail)
    .bulkResetDues();

// Violation notice
function doCopyNotice(){
  var el=document.getElementById('noticeText');
  if(!el)return;
  el.select();
  navigator.clipboard.writeText(el.value).then(function(){
    alert('Notice copied to clipboard!');
  }).catch(function(){
    document.execCommand('copy');
    alert('Notice copied to clipboard!');
  });
}

// Email copy — safe ID-based lookup avoids HTML entity issues in onclick
function doCopyById(key){
  var obj=_map[key];
  if(obj&&obj.text) doCopyText(obj.text);
}
function doCopyText(txt){
  navigator.clipboard.writeText(txt).then(function(){
    alert('Copied to clipboard!');
  }).catch(function(){
    var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);
    alert('Copied to clipboard!');
  });
}

// Export
function doExportJSON(){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(App.data,null,2)],{type:'application/json'}));
  a.download='hoa-data.json';a.click();
}
function doExportCSV(){
  var rows=[['Address','Lot#','Owner','Email','Phone','Move-in','Dues','Status','Contact Name','Contact Phone','Notes','Open Violations','Total Paid This Year']];
  var yr=new Date().getFullYear();
  App.data.properties.forEach(function(p){
    var ov=(p.violations||[]).filter(function(v){return v.status==='open';}).length;
    var tot=(p.payments||[]).filter(function(pm){return String((pm.date||'').substring(0,4))===String(yr);})
      .reduce(function(s,pm){return s+parseFloat(pm.amount||0);},0);
    rows.push([p.address,p.lotNumber||'',p.ownerName,p.ownerEmail||'',p.ownerPhone||'',p.moveInDate||'',
      p.duesStatus,p.status||'active',p.contactName||'',p.contactPhone||'',p.notes||'',ov,tot.toFixed(2)]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='hoa-properties.csv';a.click();
}
